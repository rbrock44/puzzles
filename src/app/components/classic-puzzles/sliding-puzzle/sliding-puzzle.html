<section class="widget-container">
  <p class="eyebrow">{{ categoryName }}</p>
  <h1>Sliding Puzzle</h1>
  <p class="description">Slide tiles into the blank space to put them back in order, 1 through 15.</p>

  <div class="meta-row">
    <span class="moves">Moves <strong>{{ moves() }}</strong></span>
    <button type="button" class="new-game-btn" (click)="newGame()">New game</button>
  </div>

  @if (isSolved()) {
    <p class="solved-banner" aria-live="polite">Solved in {{ moves() }} moves</p>
  }

  <div class="board" [class.solved]="isSolved()">
    @for (value of board(); track $index) {
      <button
        type="button"
        class="cell"
        [class.blank]="value === 0"
        [disabled]="value === 0"
        (click)="handleTileClick($index)"
      >
        @if (value !== 0) {
          {{ value }}
        }
      </button>
    }
  </div>
</section>
